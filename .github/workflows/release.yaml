name: Create Pre-Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Extrakt version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build binaries Linux
        run: |
          mkdir -p dist
          echo "Building version: $VERSION"

          # Linux amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.linux.amd64" .

          # Linux arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.linux.arm64" .

      - name: Build binaries Windows
        run: |
          # Windows amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.windows.amd64.exe" .
          
          # Windows arm64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.windows.arm64.exe" .

      - name: Build binaries MAC
        run: |          
          #macos arm64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.mac.arm64" .

          #macos arm64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
            -o "dist/kcc.mac.amd64" .

      - name: Create GitHub Draft-release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: true
          generate_release_notes: true
          files: |
            dist/kcc.linux.amd64
            dist/kcc.linux.arm64
            dist/kcc.windows.amd64.exe
            dist/kcc.windows.arm64.exe
            dist/kcc.mac.arm64
            dist/kcc.mac.amd64